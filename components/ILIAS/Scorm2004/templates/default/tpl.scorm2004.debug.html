<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X Debugger</title>
    <meta name="author" content="Hendrik Holtmann, modified by Uwe Kohnle, updated for modern JS">
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        #debuggerTabs {
            width: 800px;
            margin: auto;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #ccc;
            margin-bottom: 1em;
        }

        .tabs button {
            padding: 10px 20px;
            cursor: pointer;
            background: #f0f0f0;
            border: none;
            border-right: 1px solid #ccc;
        }

        .tabs button.active {
            background: #fff;
            border-bottom: 2px solid #000;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        #filesTab table {
            width: 100%;
            border-collapse: collapse;
        }

        #filesTab th, #filesTab td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        #filesTab th {
            background: #eee;
            cursor: pointer;
        }

        .actions img {
            cursor: pointer;
            width: 16px;
        }

        #commentDialog {
            display: none;
            position: fixed;
            top: 30%;
            left: 40%;
            width: 250px;
            background: white;
            border: 1px solid #888;
            padding: 20px;
            z-index: 1000;
        }

        #commentDialog textarea {
            width: 100%;
            height: 100px;
        }

        #commentDialog button {
            margin-top: 10px;
        }

        .dialog-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            width: 100%;
            height: 100%;
            z-index: 999;
            display: none;
        }
    </style>
</head>
<body>
<div id="debuggerTabs">
    <div class="tabs">
        <button class="tab-btn active" data-tab="liveLogTab">{CONSOLE}</button>
        <button class="tab-btn" data-tab="filesTab">{LOGS}</button>
        <div style="margin-left:auto;display:flex;gap:10px;">
            <img id="state" src="not" title="{START_RECORDING}" width="32" onclick="switchRecording()">
            <img id="comment" src="{COMMENT_IMG}" title="{COMMENT}" width="32" onclick="showCommentDialog()">
        </div>
    </div>

    <div id="liveLogTab" class="tab-content active">
        <iframe style="width:100%; height:535px;" id="livelog" src="{LOGFILE}"></iframe>
    </div>

    <div id="filesTab" class="tab-content">
        <table id="logTable">
            <thead>
                <tr>
                    <th data-key="filename">{FILENAME}</th>
                    <th data-key="date">{DATE}</th>
                    <!--
                    <th>{ACTION}</th>
                    -->
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="dialog-backdrop" id="dialogBackdrop" onclick="hideCommentDialog()"></div>
<div id="commentDialog">
    <div>{COMMENT_ENTER}</div>
    <textarea id="commentInput"></textarea>
    <button onclick="submitComment()">{SUBMIT}</button>
    <button onclick="hideCommentDialog()">{CANCEL}</button>
</div>

<script>
    const recordImg = '{RECORD_IMG}';
    const stopImg = '{STOP_IMG}';
    let recording = window.opener?.logActive ?? false;
    let filesData = {FILES_DATA}; // Injected as JS object
    const tableBody = document.querySelector("#logTable tbody");

    // Initial tab handling
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });

    function formatDate(dateObj) {
        if (!(dateObj instanceof Date)) return '';
        return new Intl.DateTimeFormat('de-DE', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        }).format(dateObj);
    }

    function renderTable(data) {
        tableBody.innerHTML = '';
        data.forEach(row => {
            const tr = document.createElement('tr');
            const date = (typeof row.date === 'string') ? new Date(row.date) : row.date;
            tr.innerHTML = `
                <td>${row.filename}</td>
                <td>${formatDate(date)}</td>
<!--
                <td class="actions">
                    <img src="{DELETE_IMG}" alt="Delete" title="{DELETE_LOGFILE}" onclick="deleteFile('${row.filename}')">
                </td>
-->
            `;
            tableBody.appendChild(tr);
        });
    }

    function sortBy(key, desc = false) {
        filesData.sort((a, b) => {
            if (key === "date") {
                return desc ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date);
            }
            return desc ? String(b[key]).localeCompare(String(a[key])) : String(a[key]).localeCompare(String(b[key]));
        });
        renderTable(filesData);
    }

    // Sorting logic
    let currentSort = {key: "date", desc: true};
    document.querySelectorAll("#logTable th[data-key]").forEach(th => {
        th.addEventListener('click', () => {
            const key = th.dataset.key;
            const desc = currentSort.key === key ? !currentSort.desc : true;
            currentSort = {key, desc};
            sortBy(key, desc);
        });
    });

    function switchRecording() {
        recording = !recording;
        window.opener.logActive = recording;
        document.getElementById("state").src = recording ? stopImg : recordImg;
        document.getElementById("state").title = recording ? "{STOP_RECORDING}" : "{START_RECORDING}";
        if (!recording) {
            window.opener.createSummary?.();
        }
    }

    function loadLiveLog() {
        const iframe = document.getElementById("livelog");
        iframe.src = iframe.src;
    }

    function updateLiveLog() {
        setTimeout(loadLiveLog, 2000);
    }

    function deleteFile(filename) {
        if (confirm("{DELETE_LOGFILE} " + filename + " ?")) {
            window.opener.sendLogEntry("", 'DELETE', "filename", filename, "", "");
        }
    }

    function showCommentDialog() {
        document.getElementById("dialogBackdrop").style.display = "block";
        document.getElementById("commentDialog").style.display = "block";
    }

    function hideCommentDialog() {
        document.getElementById("dialogBackdrop").style.display = "none";
        document.getElementById("commentDialog").style.display = "none";
    }

    function submitComment() {
        const comment = document.getElementById("commentInput").value.trim();
        if (comment === "") {
            alert("{COMMENT_ENTER}.");
            return;
        }
        window.opener.sendLogEntry("", "COMMENT", "", comment, "", "");
        hideCommentDialog();
    }

    // Initial setup
    (function init() {
        document.getElementById("state").src = recording ? stopImg : recordImg;
        document.getElementById("state").title = recording ? "{STOP_RECORDING}" : "{START_RECORDING}";
        renderTable(filesData);
    })();
</script>
</body>
</html>
