<h2 class="ilAccHeadingHidden">{TXT_TABS}</h2>
<ul id="ilTab" class="nav ilCollapsable hidden-print">
	<!-- BEGIN back_2_tab -->
	<li><a href="{BACK_2_TAB_LINK}" {BACK_2_TAB_TARGET}>{BACK_2_ICON} {BACK_2_TAB_TEXT}</a></li>
	<!-- END back_2_tab -->
	<!-- BEGIN back_tab -->
	<li><a href="{BACK_TAB_LINK}" {BACK_TAB_TARGET}>{BACK_ICON} {BACK_TAB_TEXT}</a></li>
	<!-- END back_tab -->
	<!-- BEGIN tab -->
	<li id="{ID}" class="{TAB_TYPE}">
		{LINK}
	</li>
	<!-- END tab -->
	<li id="ilLastTab">
		<a class="btn dropdown-toggle ilNoDisplay" aria-label="{LAST_TAB_LABEL}" href="#">
			... <span class="caret"></span>
		</a>
		<ul class="dropdown-menu" id="ilTabDropDown">
		</ul>
	</li>
</ul>
